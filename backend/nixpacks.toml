[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --prefix frontend",
  "npm install --prefix frontend --legacy-peer-deps ajv@6.12.5 ajv-keywords@3.5.2",
  "pip install --break-system-packages -r requirements.txt"
]

[phases.build]
cmds = [
  "CI=false REACT_APP_BACKEND_URL='' npm run build --prefix frontend"
]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port $PORT"
