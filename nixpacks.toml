[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.build]
cmds = [
  "npm install --legacy-peer-deps --prefix frontend",
  "REACT_APP_BACKEND_URL='' npm run build --prefix frontend",
  "pip install -r backend/requirements.txt"
]

[start]
cmd = "uvicorn backend.server:app --host 0.0.0.0 --port $PORT"
