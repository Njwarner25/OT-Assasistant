[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --prefix frontend",
    "pip install --break-system-packages -r backend/requirements.txt"
    ]

    [phases.build]
    cmds = [
      "CI=false npm run build --prefix frontend"
      ]

      [start]
      cmd = "uvicorn backend.server:app --host 0.0.0.0 --port $PORT"
