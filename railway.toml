[build]
builder = "nixpacks"
buildCommand = "npm install --legacy-peer-deps --prefix frontend && REACT_APP_BACKEND_URL='' npm run build --prefix frontend && pip install -r backend/requirements.txt"

[deploy]
startCommand = "uvicorn backend.server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/periods"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
